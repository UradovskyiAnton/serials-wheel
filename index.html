<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Серіали"/>
<meta name="theme-color" content="#2d1f2e"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon.svg"/>
<title> Серіальчики </title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Nunito:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #1e1520;
  --surface: #2a1d2c;
  --surface2: #321f35;
  --border: rgba(255,200,220,0.08);
  --border2: rgba(255,200,220,0.18);
  --text: #fdf0f5;
  --muted: #b89aa8;
  --accent: #f4a7c0;
  --accent2: #e8809f;
  --p1: #adc8f0;
  --p2: #f4a7c0;
  --soft: #f9d5e5;
  --green: #a8d8b0;
  --radius: 16px;
  --font-head: 'Cormorant Garamond', Georgia, serif;
  --font-body: 'Nunito', sans-serif;
  --safe-top: env(safe-area-inset-top);
  --safe-bot: env(safe-area-inset-bottom);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;padding:calc(var(--safe-top) + 1rem) 1rem calc(var(--safe-bot) + 5rem);overscroll-behavior:none}
h1,h2,h3{font-family:var(--font-head)}
.wrap{max-width:560px;margin:0 auto}
 
/* FLOATING HEARTS BG */
.hearts-bg{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.heart-particle{position:absolute;font-size:14px;opacity:0;animation:floatHeart linear infinite}
@keyframes floatHeart{0%{transform:translateY(100vh) rotate(0deg);opacity:0}10%{opacity:.4}90%{opacity:.1}100%{transform:translateY(-100px) rotate(20deg);opacity:0}}
 
/* SYNC */
.sync-bar{display:flex;align-items:center;justify-content:center;gap:6px;font-size:11px;color:var(--muted);margin-bottom:.75rem;position:relative;z-index:1}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);transition:background .3s}
.sync-dot.online{background:#a8d8b0}
.sync-dot.syncing{background:var(--accent);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
 
/* HEADER */
.site-header{text-align:center;margin-bottom:1.5rem;position:relative;z-index:1}
.site-header h1{font-size:34px;font-weight:500;letter-spacing:0.01em;color:var(--soft)}
.site-header h1 em{font-style:italic;color:var(--accent)}
.greeting{font-size:13px;color:var(--muted);margin-top:4px;min-height:18px;font-style:italic}
.names-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:10px}
.name-badge{font-size:13px;padding:5px 16px;border-radius:999px;font-weight:500;cursor:pointer;transition:all .2s}
.name-badge.p1{background:rgba(173,200,240,0.15);color:var(--p1);border:1px solid rgba(173,200,240,0.3)}
.name-badge.p2{background:rgba(244,167,192,0.15);color:var(--p2);border:1px solid rgba(244,167,192,0.3)}
.name-badge:hover{transform:scale(1.05)}
.heart-beat{color:var(--accent);font-size:16px;animation:heartbeat 1.4s ease-in-out infinite}
@keyframes heartbeat{0%,100%{transform:scale(1)}14%{transform:scale(1.3)}28%{transform:scale(1)}42%{transform:scale(1.2)}70%{transform:scale(1)}}
 
/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border2);display:flex;padding-bottom:var(--safe-bot);z-index:90;backdrop-filter:blur(10px)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 0 8px;cursor:pointer;color:var(--muted);font-size:10px;gap:3px;transition:color .2s;-webkit-tap-highlight-color:transparent}
.nav-item.active{color:var(--accent)}
.nav-item svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
 
/* WHEEL */
.wheel-section{display:flex;flex-direction:column;align-items:center;gap:1.1rem;margin-bottom:1.5rem;position:relative;z-index:1}
.wheel-wrap{position:relative;display:inline-block}
canvas{display:block;border-radius:50%;box-shadow:0 0 40px rgba(244,167,192,0.12)}
.pointer{position:absolute;top:50%;right:-20px;transform:translateY(-50%);width:0;height:0;border-top:12px solid transparent;border-bottom:12px solid transparent;border-left:22px solid var(--accent);filter:drop-shadow(0 0 6px rgba(244,167,192,0.6))}
.spin-btn{font-family:var(--font-head);font-size:17px;font-weight:500;padding:14px 48px;border-radius:999px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;cursor:pointer;transition:transform .1s,box-shadow .2s;box-shadow:0 4px 20px rgba(244,167,192,0.3);-webkit-tap-highlight-color:transparent;letter-spacing:0.02em}
.spin-btn:active{transform:scale(0.96)}
.spin-btn:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:none}
.respin-btn{font-size:12px;padding:7px 18px;border-radius:999px;background:none;color:var(--muted);border:1px solid var(--border2);cursor:pointer;font-family:var(--font-body);transition:all .2s;-webkit-tap-highlight-color:transparent;display:none}
.respin-btn.visible{display:block}
.respin-btn:active{color:var(--text);border-color:var(--accent)}
.result-box{min-height:70px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:14px 28px;background:var(--surface);border-radius:var(--radius);border:1px solid var(--border2);text-align:center;width:100%;position:relative;overflow:hidden}
.result-box::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(244,167,192,0.05),rgba(173,200,240,0.05));pointer-events:none}
.result-name{font-family:var(--font-head);font-size:20px;font-weight:500;color:var(--soft)}
.result-sub{font-size:12px;color:var(--muted);margin-top:3px}
 
/* TOGETHER COUNTER */
.together-card{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);padding:12px 16px;display:flex;align-items:center;gap:10px;margin-bottom:1rem;position:relative;z-index:1}
.together-icon{font-size:22px}
.together-text{flex:1}
.together-title{font-size:11px;color:var(--muted)}
.together-count{font-family:var(--font-head);font-size:18px;color:var(--accent)}
 
/* STATS */
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:1rem;position:relative;z-index:1}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 8px;text-align:center}
.stat-card .val{font-family:var(--font-head);font-size:20px;font-weight:500;color:var(--accent)}
.stat-card .lbl{font-size:10px;color:var(--muted);margin-top:2px;line-height:1.3}
 
/* LISTS */
.lists-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem;position:relative;z-index:1}
@media(max-width:400px){.lists-grid{grid-template-columns:1fr}}
.list-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:.85rem}
.list-card-title{font-size:11px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;margin-bottom:8px}
.list-card-title.c1{color:var(--p1)}
.list-card-title.c2{color:var(--p2)}
 
/* SEARCH */
.search-wrap{position:relative;margin-bottom:8px}
.search-wrap input{width:100%;font-size:13px;padding:8px 10px;border:1px solid var(--border2);border-radius:10px;background:rgba(255,200,220,0.05);color:var(--text);outline:none;font-family:var(--font-body);-webkit-appearance:none}
.search-wrap input::placeholder{color:var(--muted)}
.search-wrap input:focus{border-color:rgba(244,167,192,.4);background:rgba(244,167,192,.05)}
.dropdown{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--surface2);border:1px solid var(--border2);border-radius:12px;z-index:50;overflow:hidden;max-height:200px;overflow-y:auto;display:none}
.dropdown.open{display:block}
.dropdown-item{display:flex;align-items:center;gap:8px;padding:8px 10px;cursor:pointer;font-size:12px;-webkit-tap-highlight-color:transparent}
.dropdown-item:active{background:rgba(244,167,192,.08)}
.dropdown-item img{width:28px;height:40px;object-fit:cover;border-radius:4px;flex-shrink:0;background:var(--border)}
.di-info{flex:1;min-width:0}
.di-name{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.di-meta{font-size:10px;color:var(--muted)}
.di-rate{font-size:11px;color:var(--accent);margin-left:auto;flex-shrink:0}
 
/* PILLS */
.pill-list{display:flex;flex-direction:column;gap:4px}
.pill{display:flex;align-items:center;gap:5px;padding:5px 7px;border-radius:10px;font-size:11.5px;border:1px solid var(--border);background:rgba(255,200,220,.03);color:var(--text)}
.pill img{width:18px;height:26px;object-fit:cover;border-radius:3px;flex-shrink:0}
.pill-name{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pill-rate{font-size:10px;color:var(--accent);flex-shrink:0}
.pill-btn{background:none;border:none;cursor:pointer;color:var(--muted);font-size:13px;padding:2px;line-height:1;display:flex;align-items:center;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.pill-btn.watch{color:rgba(168,216,176,.7)}
.note-btn{background:none;border:none;cursor:pointer;color:var(--muted);font-size:11px;padding:2px;-webkit-tap-highlight-color:transparent}
.empty{font-size:12px;color:var(--muted);padding:2px 0;font-style:italic}
 
/* WATCHED */
.section-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:.85rem;margin-bottom:1rem;position:relative;z-index:1}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.section-header h3{font-size:13px;font-weight:500;color:var(--muted)}
.watched-list{display:flex;flex-direction:column;gap:6px}
.watched-item{display:flex;align-items:center;gap:7px;padding:6px 7px;border-radius:10px;background:rgba(255,200,220,.03);border:1px solid var(--border);font-size:12px}
.watched-item img{width:20px;height:28px;object-fit:cover;border-radius:3px;flex-shrink:0}
.wi-name{flex:1;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wi-who{font-size:10px;padding:2px 7px;border-radius:999px;flex-shrink:0}
.wi-who.c1{background:rgba(173,200,240,.15);color:var(--p1)}
.wi-who.c2{background:rgba(244,167,192,.15);color:var(--p2)}
.wi-rating{display:flex;gap:1px}
.star-btn{background:none;border:none;cursor:pointer;font-size:13px;padding:0;line-height:1;opacity:.25;transition:opacity .1s;-webkit-tap-highlight-color:transparent}
.star-btn.active{opacity:1}
.wi-date{font-size:10px;color:var(--muted);flex-shrink:0}
.wi-del{background:none;border:none;cursor:pointer;color:var(--muted);font-size:12px;padding:2px;-webkit-tap-highlight-color:transparent}
 
/* CONFETTI */
.confetti-piece{position:fixed;width:8px;height:8px;border-radius:2px;pointer-events:none;z-index:200;animation:confettiFall linear forwards}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
 
/* MODALS */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;display:flex;align-items:flex-end;justify-content:center;padding:1rem;opacity:0;pointer-events:none;transition:opacity .25s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:24px 24px 18px 18px;padding:1.5rem;width:100%;max-width:420px}
.modal h3{font-family:var(--font-head);font-size:18px;margin-bottom:1rem;color:var(--soft)}
.modal input,.modal textarea{width:100%;font-size:14px;padding:10px 14px;border:1px solid var(--border2);border-radius:10px;background:rgba(255,200,220,.05);color:var(--text);outline:none;font-family:var(--font-body);margin-bottom:10px;-webkit-appearance:none}
.modal textarea{resize:none;height:80px}
.modal input:focus,.modal textarea:focus{border-color:rgba(244,167,192,.4)}
.modal-btns{display:flex;gap:8px;justify-content:flex-end}
.modal-btns button{padding:10px 20px;border-radius:10px;font-size:14px;cursor:pointer;font-family:var(--font-body);-webkit-tap-highlight-color:transparent}
.btn-cancel{background:none;border:1px solid var(--border2);color:var(--muted)}
.btn-save{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#fff;font-weight:500}
</style>
</head>
<body>
 
<div class="hearts-bg" id="heartsBg"></div>
 
<div class="wrap">
  <div class="sync-bar">
    <div class="sync-dot" id="syncDot"></div>
    <span id="syncText">Підключення...</span>
  </div>
 
  <header class="site-header">
    <h1>🎬 <em>Антон і Софія</em></h1>
    <div class="greeting" id="greeting"></div>
    <div class="names-row">
      <span class="name-badge p1" id="name1badge" onclick="openNameModal(1)">Антон</span>
      <span class="heart-beat">♥</span>
      <span class="name-badge p2" id="name2badge" onclick="openNameModal(2)">Софія</span>
    </div>
  </header>
 
  <!-- WHEEL TAB -->
  <div id="tab-wheel">
    <div class="together-card">
      <div class="together-icon">🍿</div>
      <div class="together-text">
        <div class="together-title">Разом переглянули</div>
        <div class="together-count" id="togetherCount">0 серіалів</div>
      </div>
    </div>
    <div class="wheel-section">
      <div class="wheel-wrap">
        <canvas id="wheel" width="290" height="290"></canvas>
        <div class="pointer"></div>
      </div>
      <button class="spin-btn" id="spinBtn" onclick="spin()">Крутити! 🎲</button>
      <button class="respin-btn" id="respinBtn" onclick="spin()">Не хочу цей — ще раз 🙈</button>
      <div class="result-box">
        <div class="result-name" id="resultName">Додайте серіали у списки</div>
        <div class="result-sub" id="resultSub"></div>
      </div>
    </div>
  </div>
 
  <!-- LISTS TAB -->
  <div id="tab-lists" style="display:none">
    <div class="lists-grid">
      <div class="list-card">
        <div class="list-card-title c1" id="title1"></div>
        <div class="search-wrap">
          <input id="inp1" placeholder="Пошук серіалу..." oninput="onSearch(1)" autocomplete="off"/>
          <div class="dropdown" id="dd1"></div>
        </div>
        <div class="pill-list" id="list1"></div>
      </div>
      <div class="list-card">
        <div class="list-card-title c2" id="title2"></div>
        <div class="search-wrap">
          <input id="inp2" placeholder="Пошук серіалу..." oninput="onSearch(2)" autocomplete="off"/>
          <div class="dropdown" id="dd2"></div>
        </div>
        <div class="pill-list" id="list2"></div>
      </div>
    </div>
  </div>
 
  <!-- WATCHED TAB -->
  <div id="tab-watched" style="display:none">
    <div class="section-card">
      <div class="section-header">
        <h3>Вже переглянуто ✓</h3>
        <span style="font-size:11px;color:var(--muted)" id="watchedCount"></span>
      </div>
      <div class="watched-list" id="watchedList"></div>
    </div>
  </div>
 
  <!-- STATS TAB -->
  <div id="tab-stats" style="display:none">
    <div class="stats-row">
      <div class="stat-card"><div class="val" id="st-total">0</div><div class="lbl">У списках</div></div>
      <div class="stat-card"><div class="val" id="st-watched">0</div><div class="lbl">Переглянуто</div></div>
      <div class="stat-card"><div class="val" id="st-spins">0</div><div class="lbl">Кручень</div></div>
    </div>
    <div class="stats-row">
      <div class="stat-card"><div class="val" id="st-n1wins" style="color:var(--p1)">0</div><div class="lbl" id="st-n1lbl"></div></div>
      <div class="stat-card"><div class="val" id="st-n2wins" style="color:var(--p2)">0</div><div class="lbl" id="st-n2lbl"></div></div>
      <div class="stat-card"><div class="val" id="st-avgrate" style="color:var(--accent)">—</div><div class="lbl">Сер. оцінка</div></div>
    </div>
    <div class="section-card">
      <div class="section-header"><h3>Топ переглянутих ⭐</h3></div>
      <div class="watched-list" id="topList"></div>
    </div>
  </div>
</div>
 
<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <div class="nav-item active" onclick="switchTab('wheel')" id="nav-wheel">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><line x1="12" y1="3" x2="12" y2="12"/><line x1="12" y1="12" x2="18.5" y2="18.5"/></svg>
    Колесо
  </div>
  <div class="nav-item" onclick="switchTab('lists')" id="nav-lists">
    <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3.5" cy="6" r="1"/><circle cx="3.5" cy="12" r="1"/><circle cx="3.5" cy="18" r="1"/></svg>
    Списки
  </div>
  <div class="nav-item" onclick="switchTab('watched')" id="nav-watched">
    <svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
    Переглянуто
  </div>
  <div class="nav-item" onclick="switchTab('stats')" id="nav-stats">
    <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    Статистика
  </div>
</nav>
 
<!-- NAME MODAL -->
<div class="modal-overlay" id="nameModal">
  <div class="modal">
    <h3>Змінити ім'я</h3>
    <input id="nameInput" placeholder="Ваше ім'я" maxlength="20"/>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('nameModal')">Скасувати</button>
      <button class="btn-save" onclick="saveName()">Зберегти</button>
    </div>
  </div>
</div>
 
<!-- NOTE MODAL -->
<div class="modal-overlay" id="noteModal">
  <div class="modal">
    <h3>Нотатка 📝</h3>
    <textarea id="noteInput" placeholder="Наприклад: з 3 сезону краще..."></textarea>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('noteModal')">Скасувати</button>
      <button class="btn-save" onclick="saveNote()">Зберегти</button>
    </div>
  </div>
</div>
 
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, onValue, set } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';
 
const firebaseConfig = {
  apiKey: "AIzaSyCrLNgvKiGpZN8ZROfy3nJYb6q9zbZmspg",
  authDomain: "serials-wheel.firebaseapp.com",
  databaseURL: "https://serials-wheel-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "serials-wheel",
  storageBucket: "serials-wheel.firebasestorage.app",
  messagingSenderId: "678613257503",
  appId: "1:678613257503:web:7b9c536da1107fede5742a"
};
 
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const ROOT = 'serials-wheel';
 
let state = {
  names: ['Антон', 'Софія'],
  shows: { 1: [], 2: [] },
  watched: [],
  spins: 0,
  wins: { 1: 0, 2: 0 },
};
let dbReady = false;
 
// ── GREETINGS ─────────────────────────────────────────────
const greetings = [
  'Гарного вечора, Антоне і Софіє 🌙',
  'Час для улюбленого серіалу ✨',
  'Сьогодні вечір для вас двох 💕',
  'Що подивимось цієї ночі? 🌟',
  'Обіймайтесь і крутіть колесо 🎬',
  'Попкорн готовий? Крутимо! 🍿',
];
document.getElementById('greeting').textContent = greetings[Math.floor(Math.random()*greetings.length)];
 
// ── FLOATING HEARTS ───────────────────────────────────────
function spawnHearts() {
  const container = document.getElementById('heartsBg');
  const emojis = ['♥','💕','🌸','✨','💫'];
  for (let i = 0; i < 8; i++) {
    const el = document.createElement('div');
    el.className = 'heart-particle';
    el.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    el.style.left = Math.random()*100+'%';
    el.style.animationDuration = (8+Math.random()*12)+'s';
    el.style.animationDelay = (Math.random()*10)+'s';
    el.style.fontSize = (10+Math.random()*10)+'px';
    container.appendChild(el);
  }
}
spawnHearts();
 
// ── CONFETTI ──────────────────────────────────────────────
function launchConfetti() {
  const colors = ['#f4a7c0','#adc8f0','#f9d5e5','#e8809f','#d4a8d4','#f4d4a0'];
  for (let i = 0; i < 60; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.cssText = `
      left:${20+Math.random()*60}%;
      top:30%;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      animation-duration:${1.5+Math.random()*2}s;
      animation-delay:${Math.random()*0.5}s;
      transform:rotate(${Math.random()*360}deg);
      width:${6+Math.random()*8}px;
      height:${6+Math.random()*8}px;
      border-radius:${Math.random()>0.5?'50%':'2px'};
    `;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 4000);
  }
}
 
// ── SYNC STATUS ───────────────────────────────────────────
function setSyncStatus(status) {
  const dot = document.getElementById('syncDot');
  const txt = document.getElementById('syncText');
  if (status==='online') { dot.className='sync-dot online'; txt.textContent='Синхронізовано ✓'; }
  else if (status==='syncing') { dot.className='sync-dot syncing'; txt.textContent='Збереження...'; }
  else { dot.className='sync-dot'; txt.textContent='Офлайн'; }
}
 
function saveToFirebase() {
  setSyncStatus('syncing');
  set(ref(db, ROOT), state)
    .then(() => setSyncStatus('online'))
    .catch(() => setSyncStatus('offline'));
}
 
onValue(ref(db, ROOT), (snapshot) => {
  const data = snapshot.val();
  if (data) {
    state = {
      names: data.names || ['Антон', 'Софія'],
      shows: { 1: data.shows?.[1]||[], 2: data.shows?.[2]||[] },
      watched: data.watched||[],
      spins: data.spins||0,
      wins: data.wins||{1:0,2:0},
    };
  }
  if (!dbReady) { dbReady=true; document.getElementById('resultName').textContent='Додайте серіали у списки'; }
  setSyncStatus('online');
  updateUI();
}, () => setSyncStatus('offline'));
 
function updateUI() {
  updateNameBadges(); renderLists(); drawWheel(currentAngle);
  document.getElementById('togetherCount').textContent = (state.watched||[]).length + ' серіалів';
  const activeTab = document.querySelector('.nav-item.active')?.id?.replace('nav-','');
  if (activeTab==='watched') renderWatched();
  if (activeTab==='stats') renderStats();
}
 
// ── TABS ──────────────────────────────────────────────────
window.switchTab = function(name) {
  ['wheel','lists','watched','stats'].forEach(t => {
    document.getElementById('tab-'+t).style.display = t===name?'':'none';
    document.getElementById('nav-'+t).classList.toggle('active', t===name);
  });
  if (name==='watched') renderWatched();
  if (name==='stats') renderStats();
  if (name==='wheel') drawWheel(currentAngle);
};
 
// ── NAMES ─────────────────────────────────────────────────
let editingName=1;
function updateNameBadges() {
  document.getElementById('name1badge').textContent = state.names[0];
  document.getElementById('name2badge').textContent = state.names[1];
  document.getElementById('title1').textContent = state.names[0];
  document.getElementById('title2').textContent = state.names[1];
  const l1 = document.getElementById('st-n1lbl');
  const l2 = document.getElementById('st-n2lbl');
  if (l1) l1.textContent = 'Перемог '+state.names[0];
  if (l2) l2.textContent = 'Перемог '+state.names[1];
}
window.openNameModal = function(who) {
  editingName=who;
  document.getElementById('nameInput').value=state.names[who-1];
  document.getElementById('nameModal').classList.add('open');
};
window.saveName = function() {
  const v=document.getElementById('nameInput').value.trim();
  if (v) { state.names[editingName-1]=v; saveToFirebase(); updateUI(); }
  closeModal('nameModal');
};
window.closeModal = function(id) { document.getElementById(id).classList.remove('open'); };
 
// ── NOTE ──────────────────────────────────────────────────
let noteCtx=null;
window.openNoteModal = function(who,idx) {
  noteCtx={who,idx};
  document.getElementById('noteInput').value=state.shows[who][idx].note||'';
  document.getElementById('noteModal').classList.add('open');
};
window.saveNote = function() {
  if (noteCtx) { state.shows[noteCtx.who][noteCtx.idx].note=document.getElementById('noteInput').value.trim(); saveToFirebase(); renderLists(); }
  closeModal('noteModal');
};
 
// ── TMDB ──────────────────────────────────────────────────
const TMDB_KEY='YOUR_TMDB_API_KEY';
const TMDB_IMG='94be006f3d30c2e9de9b4ff0f8afc33d';
let searchTimer=null;
 
window.onSearch = function(who) {
  clearTimeout(searchTimer);
  const q=document.getElementById('inp'+who).value.trim();
  if (!q) { closeDD(who); return; }
  searchTimer=setTimeout(()=>fetchShows(q,who), 400);
};
async function fetchShows(q,who) {
  if (TMDB_KEY==='YOUR_TMDB_API_KEY') { showManualAdd(q,who); return; }
  try {
    const r=await fetch(`https://api.themoviedb.org/3/search/tv?api_key=${TMDB_KEY}&query=${encodeURIComponent(q)}&language=uk-UA`);
    const d=await r.json();
    showDD(d.results?.slice(0,6)||[],who);
  } catch(e) { showManualAdd(q,who); }
}
function showManualAdd(q,who) {
  const dd=document.getElementById('dd'+who);
  const safe=q.replace(/'/g,"\\'").replace(/"/g,'&quot;');
  dd.innerHTML=`<div class="dropdown-item" onclick="addShow(${who},{'name':'${safe}','poster':null,'rating':null,'year':null})">
    <div style="width:28px;height:40px;border-radius:4px;background:var(--border2);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0">+</div>
    <div class="di-info"><div class="di-name">Додати «${q}»</div><div class="di-meta">вручну</div></div></div>`;
  dd.classList.add('open');
}
function showDD(results,who) {
  const dd=document.getElementById('dd'+who);
  if (!results.length) { closeDD(who); return; }
  dd.innerHTML=results.map(r=>{
    const poster=r.poster_path?`${TMDB_IMG}${r.poster_path}`:null;
    const year=r.first_air_date?r.first_air_date.slice(0,4):'';
    const rate=r.vote_average?r.vote_average.toFixed(1):'';
    const obj=JSON.stringify({name:r.name,poster,rating:rate,year}).replace(/"/g,'&quot;');
    return `<div class="dropdown-item" onclick="addShow(${who},${obj})">
      ${poster?`<img src="${poster}" alt="">`:`<div style="width:28px;height:40px;border-radius:4px;background:var(--border2);flex-shrink:0"></div>`}
      <div class="di-info"><div class="di-name">${r.name}</div><div class="di-meta">${year}</div></div>
      ${rate?`<div class="di-rate">★ ${rate}</div>`:''}
    </div>`;
  }).join('');
  dd.classList.add('open');
}
function closeDD(who) { document.getElementById('dd'+who).classList.remove('open'); }
document.addEventListener('click',e=>{ if (!e.target.closest('.search-wrap')) { closeDD(1); closeDD(2); } });
 
// ── SHOWS ─────────────────────────────────────────────────
window.addShow = function(who,data) {
  if (!data?.name) return;
  const already=[...(state.shows[1]||[]),...(state.shows[2]||[])].some(s=>s.name===data.name);
  if (already) { closeDD(who); return; }
  if (!state.shows[who]) state.shows[who]=[];
  state.shows[who].push({name:data.name,poster:data.poster||null,rating:data.rating||null,year:data.year||null,note:'',who:parseInt(who)});
  document.getElementById('inp'+who).value='';
  closeDD(who); saveToFirebase(); renderLists(); drawWheel(currentAngle);
};
window.removeShow = function(who,idx) { state.shows[who].splice(idx,1); saveToFirebase(); renderLists(); drawWheel(currentAngle); };
window.markWatched = function(who,idx) {
  const show=state.shows[who][idx];
  if (!state.watched) state.watched=[];
  state.watched.push({...show,date:new Date().toLocaleDateString('uk-UA'),ratingUser:0});
  state.shows[who].splice(idx,1);
  document.getElementById('togetherCount').textContent=(state.watched.length)+' серіалів';
  saveToFirebase(); renderLists(); drawWheel(currentAngle);
};
 
function renderLists() {
  updateNameBadges();
  [1,2].forEach(who=>{
    const el=document.getElementById('list'+who);
    const arr=state.shows[who]||[];
    if (!arr.length) { el.innerHTML='<span class="empty">Список порожній 🌸</span>'; return; }
    el.innerHTML=arr.map((s,i)=>`
      <div class="pill">
        ${s.poster?`<img src="${s.poster}" alt="">`:''}
        <span class="pill-name">${s.name}</span>
        ${s.rating?`<span class="pill-rate">★${s.rating}</span>`:''}
        <button class="note-btn" onclick="openNoteModal(${who},${i})" title="${s.note||'Нотатка'}">📝</button>
        <button class="pill-btn watch" onclick="markWatched(${who},${i})">✓</button>
        <button class="pill-btn" onclick="removeShow(${who},${i})">×</button>
      </div>`).join('');
  });
}
 
function renderWatched() {
  const el=document.getElementById('watchedList');
  const arr=state.watched||[];
  document.getElementById('watchedCount').textContent=arr.length+' серіалів';
  if (!arr.length) { el.innerHTML='<span class="empty">Ще нічого не переглянуто 🍿</span>'; return; }
  el.innerHTML=[...arr].reverse().map((s,ri)=>{
    const i=arr.length-1-ri;
    const whoName=s.who==1?state.names[0]:state.names[1];
    const whoClass=s.who==1?'c1':'c2';
    return `<div class="watched-item">
      ${s.poster?`<img src="${s.poster}" alt="">`:''}
      <span class="wi-name">${s.name}</span>
      <span class="wi-who ${whoClass}">${whoName}</span>
      <div class="wi-rating">${[1,2,3,4,5].map(n=>`<button class="star-btn${s.ratingUser>=n?' active':''}" onclick="rateWatched(${i},${n})">★</button>`).join('')}</div>
      <span class="wi-date">${s.date||''}</span>
      <button class="wi-del" onclick="delWatched(${i})">×</button>
    </div>`;
  }).join('');
}
window.rateWatched=function(idx,r){state.watched[idx].ratingUser=r;saveToFirebase();renderWatched();};
window.delWatched=function(idx){state.watched.splice(idx,1);saveToFirebase();renderWatched();};
 
function renderStats() {
  document.getElementById('st-total').textContent=(state.shows[1]||[]).length+(state.shows[2]||[]).length;
  document.getElementById('st-watched').textContent=(state.watched||[]).length;
  document.getElementById('st-spins').textContent=state.spins||0;
  document.getElementById('st-n1wins').textContent=state.wins?.[1]||0;
  document.getElementById('st-n1lbl').textContent='Перемог '+state.names[0];
  document.getElementById('st-n2wins').textContent=state.wins?.[2]||0;
  document.getElementById('st-n2lbl').textContent='Перемог '+state.names[1];
  const rated=(state.watched||[]).filter(w=>w.ratingUser>0);
  const avg=rated.length?(rated.reduce((a,b)=>a+b.ratingUser,0)/rated.length).toFixed(1):'—';
  document.getElementById('st-avgrate').textContent=avg==='—'?'—':'★'+avg;
  const top=[...(state.watched||[])].filter(w=>w.ratingUser>0).sort((a,b)=>b.ratingUser-a.ratingUser).slice(0,5);
  document.getElementById('topList').innerHTML=top.length?top.map(s=>`
    <div class="watched-item">
      ${s.poster?`<img src="${s.poster}" alt="">`:''}
      <span class="wi-name">${s.name}</span>
      <span style="color:var(--accent);font-size:12px">${'★'.repeat(s.ratingUser)}</span>
    </div>`).join(''):'<span class="empty">Оцініть переглянуті серіали</span>';
}
 
// ── WHEEL ─────────────────────────────────────────────────
let spinning=false, currentAngle=0;
function allShows(){return [...(state.shows[1]||[]).map(s=>({...s,who:1})),...(state.shows[2]||[]).map(s=>({...s,who:2}))];}
 
window.drawWheel = function(angle) {
  const c=document.getElementById('wheel'); if(!c) return;
  const ctx=c.getContext('2d'),cx=145,cy=145,r=133;
  ctx.clearRect(0,0,290,290);
  const items=allShows();
  if (!items.length) {
    ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);
    const g=ctx.createRadialGradient(cx,cy,0,cx,cy,r);
    g.addColorStop(0,'#2a1d2c');g.addColorStop(1,'#1e1520');
    ctx.fillStyle=g;ctx.fill();
    ctx.fillStyle='#b89aa8';ctx.font='13px DM Sans,sans-serif';ctx.textAlign='center';ctx.fillText('Додайте серіали 🌸',cx,cy);
    return;
  }
  const slice=(Math.PI*2)/items.length;
  const p1fills=['#1e2d3f','#1a2a3a','#162436'];
  const p2fills=['#3a1f2d','#321a28','#2c1622'];
  items.forEach((s,i)=>{
    const start=angle+i*slice,end=start+slice;
    const fills=s.who===1?p1fills:p2fills;
    const fill=fills[i%fills.length];
    const textCol=s.who===1?'#adc8f0':'#f4a7c0';
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,start,end);ctx.closePath();
    ctx.fillStyle=fill;ctx.fill();
    ctx.strokeStyle='rgba(255,200,220,0.08)';ctx.lineWidth=1;ctx.stroke();
    ctx.save();ctx.translate(cx,cy);ctx.rotate(start+slice/2);
    ctx.textAlign='right';ctx.fillStyle=textCol;
    const fs=items.length>10?10:items.length>6?11:12;
    ctx.font=`500 ${fs}px DM Sans,sans-serif`;
    ctx.fillText(s.name.length>15?s.name.slice(0,14)+'…':s.name,r-8,4);
    ctx.restore();
  });
  ctx.beginPath();ctx.arc(cx,cy,18,0,Math.PI*2);
  const cg=ctx.createRadialGradient(cx,cy,0,cx,cy,18);
  cg.addColorStop(0,'#3a1f2d');cg.addColorStop(1,'#1e1520');
  ctx.fillStyle=cg;ctx.fill();
  ctx.strokeStyle='rgba(244,167,192,0.3)';ctx.lineWidth=1.5;ctx.stroke();
};
 
window.spin = function() {
  const items=allShows();
  if (!items.length||spinning) return;
  spinning=true;
  document.getElementById('spinBtn').disabled=true;
  document.getElementById('respinBtn').classList.remove('visible');
  document.getElementById('resultName').textContent='🎲';
  document.getElementById('resultSub').textContent='';
  state.spins=(state.spins||0)+1;
  const slice=(Math.PI*2)/items.length;
  const total=Math.PI*2*(6+Math.random()*4)+Math.random()*Math.PI*2;
  const duration=3800,start=performance.now(),startAngle=currentAngle;
  function ease(t){return 1-Math.pow(1-t,4);}
  function frame(now){
    const t=Math.min((now-start)/duration,1);
    currentAngle=startAngle+total*ease(t);
    drawWheel(currentAngle);
    if(t<1){requestAnimationFrame(frame);return;}
    currentAngle=currentAngle%(Math.PI*2);
    const idx=Math.floor(((Math.PI*2-currentAngle)%(Math.PI*2))/slice)%items.length;
    const winner=items[idx];
    document.getElementById('resultName').textContent=winner.name;
    document.getElementById('resultSub').textContent=`зі списку ${winner.who===1?state.names[0]:state.names[1]}${winner.rating?' · ★'+winner.rating:''}`;
    if (!state.wins) state.wins={1:0,2:0};
    state.wins[winner.who]=(state.wins[winner.who]||0)+1;
    saveToFirebase();
    launchConfetti();
    spinning=false;
    document.getElementById('spinBtn').disabled=false;
    document.getElementById('respinBtn').classList.add('visible');
  }
  requestAnimationFrame(frame);
};
 
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js',{scope:'/'}).catch(()=>{});
}
</script>
